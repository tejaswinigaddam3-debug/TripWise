<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TripWise | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg1:#0f172a;
            --bg2:#1d4ed8;
            --card:#ffffff;
            --text:#172033;
            --muted:#6b7280;
            --primary:#2563eb;
            --border:#e5e7eb;
            --shadow:0 20px 50px rgba(0,0,0,.18);
        }

        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
        }

        body{
            font-family:'Inter',sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:linear-gradient(135deg, var(--bg1), var(--bg2));
            padding:20px;
            color:var(--text);
        }

        .container{
            width:100%;
            max-width:420px;
            background:rgba(255,255,255,.96);
            backdrop-filter:blur(10px);
            border-radius:24px;
            padding:34px;
            box-shadow:var(--shadow);
        }

        .brand{
            text-align:center;
            margin-bottom:22px;
        }

        .brand h1{
            font-size:1.8rem;
            margin-bottom:8px;
        }

        .brand p{
            color:var(--muted);
            font-size:.95rem;
        }

        .form-group{
            margin-bottom:16px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-size:.92rem;
            font-weight:600;
        }

        input{
            width:100%;
            padding:14px 15px;
            border:1px solid var(--border);
            border-radius:12px;
            outline:none;
            font:inherit;
            transition:.2s ease;
            background:#fff;
        }

        input:focus{
            border-color:var(--primary);
            box-shadow:0 0 0 4px rgba(37,99,235,.12);
        }

        .row{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            margin:10px 0 18px;
            font-size:.92rem;
            color:var(--muted);
            flex-wrap:wrap;
        }

        .row a{
            color:var(--primary);
            text-decoration:none;
            font-weight:600;
        }

        .btn{
            width:100%;
            border:none;
            background:var(--primary);
            color:#fff;
            padding:14px 16px;
            border-radius:12px;
            font-weight:700;
            cursor:pointer;
            transition:.2s ease;
        }

        .btn:hover{
            transform:translateY(-1px);
            box-shadow:0 10px 20px rgba(37,99,235,.25);
        }

        .divider{
            display:flex;
            align-items:center;
            gap:12px;
            margin:22px 0;
            color:var(--muted);
            font-size:.9rem;
        }

        .divider::before,
        .divider::after{
            content:"";
            flex:1;
            height:1px;
            background:var(--border);
        }

        .social{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:12px;
        }

        .social button{
            border:1px solid var(--border);
            background:#fff;
            padding:12px;
            border-radius:12px;
            cursor:pointer;
            font-weight:600;
        }

        .footer{
            margin-top:18px;
            text-align:center;
            color:var(--muted);
            font-size:.92rem;
        }

        .footer a{
            color:var(--primary);
            text-decoration:none;
            font-weight:600;
        }

        @media (max-width:480px){
            .container{
                padding:24px;
                border-radius:20px;
            }

            .social{
                grid-template-columns:1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="brand">
        <h1>TripWise</h1>
        <p>Sign in to manage your trips, bookings, and budget.</p>
    </div>

    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required />
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required />
        </div>

        <div class="row">
            <label style="display:flex;align-items:center;gap:8px;font-weight:500;">
                <input type="checkbox" style="width:auto; margin:0;" />
                Remember me
            </label>
            <a href="#">Forgot password?</a>
        </div>

        <button class="btn" type="submit">Login</button>

        <div class="divider">or</div>

        <div class="social">
            <button type="button">Google</button>
            <button type="button">Facebook</button>
        </div>
    </form>

    <div class="footer">
        Don't have an account? <a href="register.html">Sign up</a>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
