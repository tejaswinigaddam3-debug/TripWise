<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trip Planner Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #172033;
            --muted: #6b7280;
            --primary: #2563eb;
            --primary-soft: #dbeafe;
            --success: #16a34a;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #e5e7eb;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            --radius: 18px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .app {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: #0f172a;
            color: white;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .brand {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .nav {
            display: grid;
            gap: 10px;
        }

        .nav a {
            color: #cbd5e1;
            text-decoration: none;
            padding: 12px 14px;
            border-radius: 12px;
            transition: 0.2s ease;
        }

        .nav a.active,
        .nav a:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }

        .sidebar-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px;
        }

        .main {
            padding: 28px;
            display: grid;
            gap: 22px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .search {
            flex: 1;
            min-width: 260px;
            max-width: 520px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            color: var(--muted);
            box-shadow: var(--shadow);
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 10px 14px;
            box-shadow: var(--shadow);
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #7c3aed);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 18px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .stat {
            padding: 20px;
        }

        .stat h3 {
            font-size: 0.95rem;
            color: var(--muted);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .stat .value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .stat .trend {
            margin-top: 8px;
            font-size: 0.9rem;
            color: var(--success);
        }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 18px;
        }

        .panel {
            padding: 22px;
        }

        .panel h2 {
            font-size: 1.1rem;
            margin-bottom: 16px;
        }

        .trip-list {
            display: grid;
            gap: 14px;
        }

        .trip-item {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: #fafafa;
        }

        .trip-item strong {
            display: block;
            margin-bottom: 4px;
        }

        .badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
            background: var(--primary-soft);
            color: var(--primary);
        }

        .calendar {
            display: grid;
            gap: 12px;
        }

        .day {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: #fafafa;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
